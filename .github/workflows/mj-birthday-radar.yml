name: MJ Birthday Radar (weekly)

on:
  schedule:
    # Wednesday 15:00 UTC = 8am PT / 11am ET — reach parents 90/60/30 days before the child's birthday
    - cron: "0 15 * * 3"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: mj-birthday-radar
  cancel-in-progress: false

jobs:
  radar:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          pip install --upgrade pip
          pip install python-dotenv

      - name: Run weekly birthday radar
        env:
          GHL_API_KEY_POL: ${{ secrets.GHL_API_KEY_POL }}
          GHL_LOCATION_ID_POL: ${{ secrets.GHL_LOCATION_ID_POL }}
          GHL_API_KEY_WP: ${{ secrets.GHL_API_KEY_WP }}
          GHL_LOCATION_ID_WP: ${{ secrets.GHL_LOCATION_ID_WP }}
          CHILD_BDAY_FIELD_ID: ${{ secrets.CHILD_BDAY_FIELD_ID }}
        run: |
          python scripts/mj_birthday_radar.py run --execute
