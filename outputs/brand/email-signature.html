<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
</head>
<body style="margin:0;padding:0;background:transparent;">

<!--
=================================================================
  WILBA Email Signature — Jess Morrell
  Logo: embedded as base64 (no external hosting needed)

  ✅ HOW TO ADD TO GMAIL (takes 2 minutes):

  Step 1: Open this file in Chrome
          File → Open File → select email-signature.html
          (or drag the file into a Chrome tab)

  Step 2: Select the entire signature
          Press Cmd+A to select all, then Cmd+C to copy

  Step 3: Go to Gmail Settings
          gmail.com → top-right gear icon → See all settings

  Step 4: Scroll to "Signature" section
          Click "+ Create new" and give it a name (e.g. "WILBA")

  Step 5: Click inside the signature text box and paste (Cmd+V)
          The formatted signature with logo should appear

  Step 6: Set as default (optional)
          Under "Signature defaults" set it for New emails
          and/or Replies/Forwards

  Step 7: Click "Save Changes" at the bottom of the page

  ─────────────────────────────────────────────────────────────

  TO INSTALL IN APPLE MAIL:
    Open this file in Chrome → Select All (Cmd+A) → Copy (Cmd+C)
    Mail → Settings → Signatures → click + → paste (Cmd+V)

=================================================================
-->

<table cellpadding="0" cellspacing="0" border="0"
       style="font-family: Arial, Helvetica, sans-serif;
              max-width: 500px;
              border-collapse: collapse;">

  <!-- Top accent bar -->
  <tr>
    <td colspan="3"
        style="height: 3px;
               background: linear-gradient(90deg, #1A1A1A 0%, #87ABDD 100%);
               padding: 0; font-size: 0; line-height: 0;">
    </td>
  </tr>

  <!-- Main row -->
  <tr>

    <!-- LEFT: Name + contact -->
    <td style="padding: 18px 24px 16px 0;
               vertical-align: top;
               white-space: nowrap;">

      <p style="margin: 0 0 1px 0;
                font-size: 17px;
                font-weight: 700;
                color: #1A1A1A;
                letter-spacing: -0.3px;
                line-height: 1.2;">
        Jess Morrell
      </p>

      <p style="margin: 0 0 12px 0;
                font-size: 11px;
                color: #87ABDD;
                letter-spacing: 1px;
                text-transform: uppercase;
                font-weight: 600;">
        Founder &amp; AI Automation Strategist
      </p>

      <!-- Ruled divider -->
      <table cellpadding="0" cellspacing="0" border="0"
             style="margin-bottom: 11px;">
        <tr>
          <td style="width: 24px; height: 1px;
                     background: #87ABDD; font-size: 0;"></td>
          <td style="width: 100px; height: 1px;
                     background: #EBEBEB; font-size: 0;"></td>
        </tr>
      </table>

      <!-- Contact lines -->
      <table cellpadding="0" cellspacing="0" border="0">

        <tr>
          <td style="padding: 3px 0; vertical-align: middle;">
            <!-- Globe icon -->
            <span style="color: #87ABDD; font-size: 11px;
                         margin-right: 6px;">&#127760;</span>
            <a href="https://www.wilba.ai"
               style="font-size: 12px; color: #1A1A1A;
                      text-decoration: none; font-weight: 600;">
              wilba.ai
            </a>
          </td>
        </tr>

        <tr>
          <td style="padding: 3px 0; vertical-align: middle;">
            <!-- Email icon -->
            <span style="color: #87ABDD; font-size: 11px;
                         margin-right: 6px;">&#9993;</span>
            <a href="mailto:hello@wilba.ai"
               style="font-size: 12px; color: #5A5A5A;
                      text-decoration: none;">
              hello@wilba.ai
            </a>
          </td>
        </tr>

        <tr>
          <td style="padding: 3px 0; vertical-align: middle;">
            <!-- Instagram icon -->
            <span style="color: #87ABDD; font-size: 11px;
                         margin-right: 6px;">&#9642;</span>
            <a href="https://www.instagram.com/wilba.ai"
               style="font-size: 12px; color: #5A5A5A;
                      text-decoration: none;">
              @wilba.ai
            </a>
          </td>
        </tr>

        <tr>
          <td style="padding: 3px 0; vertical-align: middle;">
            <!-- Location pin -->
            <span style="color: #87ABDD; font-size: 11px;
                         margin-right: 6px;">&#128205;</span>
            <span style="font-size: 12px; color: #9A9A9A;">
              Surf Coast, Victoria, Australia
            </span>
          </td>
        </tr>

      </table>
    </td>

    <!-- Vertical divider -->
    <td style="width: 1px; background: #EBEBEB;
               padding: 16px 0; font-size: 0;">&nbsp;</td>

    <!-- RIGHT: Logo + CTA -->
    <td style="padding: 18px 0 16px 24px;
               vertical-align: middle;
               text-align: center;
               min-width: 170px;">

      <!--
        ┌──────────────────────────────────────────────┐
        │  LOGO: Replace src="" with your logo URL or  │
        │  base64 string (see instructions at top).    │
        │  Until then, the text fallback below shows.  │
        └──────────────────────────────────────────────┘
      -->
      <img src=""
           alt="wilba.ai"
           width="120"
           style="display: block;
                  margin: 0 auto 14px auto;
                  max-width: 120px;"
           onerror="this.style.display='none';
                    document.getElementById('wilba-wordmark').style.display='block';">

      <!-- Text fallback (hidden when logo loads) -->
      <p id="wilba-wordmark"
         style="display: block;
                margin: 0 auto 14px auto;
                font-size: 24px;
                font-weight: 800;
                color: #1A1A1A;
                letter-spacing: -1px;
                line-height: 1;
                text-align: center;">
        wilba<span style="color: #87ABDD;">.ai</span>
      </p>

      <!-- CTA button -->
      <a href="https://www.wilba.ai/ai-business-audit"
         style="display: inline-block;
                background-color: #1A1A1A;
                color: #ffffff;
                font-size: 10px;
                font-weight: 700;
                letter-spacing: 1px;
                text-transform: uppercase;
                text-decoration: none;
                padding: 8px 16px;
                border-radius: 2px;
                line-height: 1.4;">
        Get Your Free AI Business Audit &rarr;
      </a>

    </td>
  </tr>

  <!-- Bottom tagline strip -->
  <tr>
    <td colspan="3"
        style="background-color: #F7F5F1;
               padding: 9px 0;
               border-top: 1px solid #EBEBEB;">
      <p style="margin: 0;
                font-size: 10px;
                color: #9A9A9A;
                font-style: italic;
                letter-spacing: 0.3px;">
        We find where your business is bleeding time. &mdash;
        <span style="color: #87ABDD; font-style: normal;
                     font-weight: 600;">Then we fix it.</span>
      </p>
    </td>
  </tr>

</table>
