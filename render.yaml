services:
  - type: web
    name: wilba-audit-responder
    runtime: python
    buildCommand: pip install -r scripts/requirements-audit.txt
    startCommand: python scripts/serve.py
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: FROM_EMAIL
        value: hello@wilba.ai
      - key: CALENDLY_URL
        value: https://calendly.com/hello-wilba
      - key: TEST_EMAIL
        value: hello@wilba.ai
