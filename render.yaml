services:
  - type: web
    name: wilba-audit-responder
    runtime: python
    buildCommand: apt-get install -y libpango-1.0-0 libpangocairo-1.0-0 libcairo2 libgdk-pixbuf2.0-0 libffi-dev shared-mime-info && pip install -r scripts/requirements-audit.txt
    startCommand: gunicorn scripts.audit_email_responder:app
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: FROM_EMAIL
        value: hello@wilba.ai
      - key: CALENDLY_URL
        value: https://calendly.com/hello-wilba
      - key: TEST_EMAIL
        value: hello@wilba.ai
